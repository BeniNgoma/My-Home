name: EAS Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'caretrack/apps/mobile/**'
      - '.github/workflows/eas-build.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caretrack/package-lock.json

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: caretrack
        run: npm install

      - name: Build Android APK
        working-directory: caretrack/apps/mobile
        run: eas build --platform android --profile preview --non-interactive

      - name: Done
        run: echo "✅ APK ready — https://expo.dev/accounts/beningoma/projects/caretrack-mobile/builds"
